<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - ReUnify</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .login-box {
      width: 380px; padding: 30px; background: #fff; border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }
    .btn-custom { background: #1e3c72; border: none; border-radius: 8px; color: #fff; }
  </style>
</head>
<body>
  <div class="login-box">
    <h3 class="text-center mb-4">Login</h3>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} py-2">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <input type="email" name="email" class="form-control" placeholder="Email" required>
      </div>
      <div class="mb-3">
        <input type="password" name="password" class="form-control" placeholder="Password" required>
      </div>
      <div class="mb-3">
        <select name="role" class="form-control" required>
          <option value="">-- Choose Role --</option>
          <option value="admin">Admin</option>
          <option value="alumni">Alumni</option>
          <option value="student">Student</option>
        </select>
      </div>
      <button type="submit" class="btn btn-custom w-100">Sign In</button>
    </form>

    <div class="mt-3 text-center">
      <a href="{{ url_for('register') }}">Admin Sign Up</a>
    </div>
  </div>
</body>
</html>
