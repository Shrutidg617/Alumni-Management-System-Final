<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Sign Up - ReUnify</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .signup-box {
      width: 420px;
      padding: 30px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      color: #333;
    }
    .signup-box h3 {
      text-align: center;
      margin-bottom: 25px;
      font-weight: 600;
      color: #1e3c72;
    }
    .form-control {
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    .form-control:focus {
      border-color: #1e3c72;
      box-shadow: 0 0 0 0.2rem rgba(30, 60, 114, 0.25);
    }
    .btn-custom {
      background: #1e3c72;
      border: none;
      border-radius: 8px;
      padding: 10px;
      color: #fff;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .btn-custom:hover {
      background: #2a5298;
      transform: translateY(-2px);
    }
    .extra-links {
      text-align: center;
      margin-top: 15px;
    }
    .extra-links a {
      color: #1e3c72;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="signup-box">
    <h3>Admin Registration</h3>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} py-2">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <input type="text" name="name" class="form-control" placeholder="Full Name" required>
      </div>
      <div class="mb-3">
        <input type="email" name="email" class="form-control" placeholder="Email Address" required>
      </div>
      <div class="mb-3">
        <input type="password" name="password" class="form-control" placeholder="Password" required>
      </div>
      <div class="mb-3">
        <input type="text" name="institute_name" class="form-control" placeholder="Institute Name" required>
      </div>
      <div class="mb-3">
        <input type="text" name="designation" class="form-control" placeholder="Designation (Optional)">
      </div>
      <button type="submit" class="btn btn-custom w-100">Create Account</button>
    </form>

    <div class="extra-links">
      <a href="{{ url_for('login') }}">Already registered? Login</a>
    </div>
  </div>

</body>
</html>
