{% extends 'alumni/base_alumni.html' %}
{% block title %}Profile{% endblock %}
{% block topbar_title %}Profile{% endblock %}
{% block content %}
<h2 class="mb-4">My Profile</h2>

<div class="card p-4 bg-white">
  <form method="POST">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Full Name</label>
        <input type="text" name="name" class="form-control" value="{{ alumni.name }}" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" value="{{ alumni.email }}" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Phone</label>
        <input type="text" name="phone" class="form-control" value="{{ alumni.phone or '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">Graduation Year</label>
        <input type="text" name="graduation_year" class="form-control" value="{{ alumni.graduation_year }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">Department</label>
        <input type="text" name="department" class="form-control" value="{{ alumni.department }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">Current Company</label>
        <input type="text" name="company" class="form-control" value="{{ alumni.company or '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">Designation</label>
        <input type="text" name="designation" class="form-control" value="{{ alumni.designation or '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">LinkedIn</label>
        <input type="text" name="linkedin" class="form-control" value="{{ alumni.linkedin or '' }}">
      </div>
      <div class="col-12">
        <label class="form-label">Bio</label>
        <textarea name="bio" class="form-control" rows="4">{{ alumni.bio or '' }}</textarea>
      </div>
      <div class="col-12">
        <button type="submit" class="btn btn-primary">Update Profile</button>
      </div>
    </div>
  </form>
</div>
{% endblock %}
